<script>

        // System state database representation (simulating Sheet databases)
        let state = {
            vehicles: [],
            categories: [],
            maintenanceLogs: [],
            fuelLogs: [],
            alerts: [],
            selectedVehicleId: '',
            adminAuthenticated: false,
            lineLogs: [],
            lineNotifyConfigured: false,
            driveFolderId: ''
        };
        // --- Google Apps Script API layer ---
        function showLoading(msg) {
            const el = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            if (txt) txt.textContent = msg || 'กำลังโหลด...';
            if (el) el.classList.remove('hidden');
        }

        function hideLoading() {
            const el = document.getElementById('loading-overlay');
            if (el) el.classList.add('hidden');
        }

        function runGas(fn, args, onSuccess, onError) {
            showLoading();
            const runner = google.script.run
                .withSuccessHandler(function(result) {
                    hideLoading();
                    if (result && result.success === false) {
                        showToast(result.error || 'เกิดข้อผิดพลาด', 'error');
                        if (onError) onError(result);
                        return;
                    }
                    if (onSuccess) onSuccess(result);
                })
                .withFailureHandler(function(err) {
                    hideLoading();
                    showToast(err.message || String(err), 'error');
                    if (onError) onError(err);
                });
            if (args === undefined) runner[fn]();
            else if (Array.isArray(args)) runner[fn].apply(runner, args);
            else runner[fn](args);
        }

        function applyState(newState) {
            if (!newState) return;
            const adminAuth = state.adminAuthenticated;
            state = Object.assign({}, newState, { adminAuthenticated: adminAuth });
        }

        function refreshUI() {
            populateDropdowns();
            renderVehiclesCarousel();
            const vid = state.selectedVehicleId || (state.vehicles[0] && state.vehicles[0].id);
            if (vid) selectVehicle(vid);
            renderReports();
            initCustomCalendar();
            setDefaultDates();
        }

        function loadAppState(selectedId, callback) {
            runGas('getAppState', [selectedId || ''], function(result) {
                applyState(result);
                refreshUI();
                if (callback) callback(result);
            });
        }


        // Shared Custom Thai Calendar State Variables
        let calendarTargetField = 'maintenance'; // 'maintenance' or 'fuel'
        let calendarSelectedDate = new Date();
        let calendarViewMonth = new Date().getMonth(); 
        let calendarViewYear = new Date().getFullYear();

        const thaiMonthsFull = [
            'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
            'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
        ];
        const thaiMonthsShort = [
            'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
            'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'
        ];

        let currentUploadedReceiptBase64 = "";

        // App Initializer
        function initApp() {
            loadAppState('', function() {
                checkLineAlerts(false);
                switchTab('dashboard');
            });
        }

        // Set Default Date Helper for both forms (June 6, 2026)
        function setDefaultDates() {
            const now = new Date();
            const iso = now.toISOString().split('T')[0];
            const thaiStr = formatThaiDate(iso);
            const repDate = document.getElementById('rep-date');
            const calText = document.getElementById('calendar-trigger-text');
            const fuelDate = document.getElementById('fuel-date');
            const fuelCalText = document.getElementById('fuel-calendar-trigger-text');
            if (repDate) repDate.value = iso;
            if (calText) calText.textContent = thaiStr;
            if (fuelDate) fuelDate.value = iso;
            if (fuelCalText) fuelCalText.textContent = thaiStr;
            calendarSelectedDate = now;
            calendarViewMonth = now.getMonth();
            calendarViewYear = now.getFullYear();
        }

        function saveToLocalStorage() { /* persisted in Google Sheets */ }

        // Dropdowns Populator
        function populateDropdowns() {
            const odoSelect = document.getElementById('odo-vehicle-select');
            const repSelect = document.getElementById('rep-vehicle-select');
            const fuelSelect = document.getElementById('fuel-vehicle-select');
            const repCat = document.getElementById('rep-category');
            const repVehFilter = document.getElementById('report-vehicle-filter');

            odoSelect.innerHTML = '';
            repSelect.innerHTML = '';
            fuelSelect.innerHTML = '';
            
            if (repVehFilter) {
                repVehFilter.innerHTML = '<option value="ALL">🚘 รถทั้งหมดในบ้าน</option>';
            }

            state.vehicles.forEach(v => {
                const opt = `<option value="${v.id}">${v.name} (${v.license})</option>`;
                odoSelect.innerHTML += opt;
                repSelect.innerHTML += opt;
                fuelSelect.innerHTML += opt;
                
                if (repVehFilter) {
                    repVehFilter.innerHTML += `<option value="${v.id}">${v.name}</option>`;
                }
            });

            state.categories.forEach(c => {
                repCat.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
            
            repCat.innerHTML += `<option value="OTHER" class="text-indigo-600 font-bold">✨ อื่นๆ (ระบุเอง)</option>`;

            // Initialize Calendar Year/Month select dropdowns
            populateCalendarDropdownSelectors();
        }

        function handleCategoryChange(val) {
            const otherContainer = document.getElementById('rep-category-other-container');
            const otherInput = document.getElementById('rep-category-other');
            if (val === 'OTHER') {
                otherContainer.classList.remove('hidden');
                otherInput.required = true;
                otherInput.focus();
            } else {
                otherContainer.classList.add('hidden');
                otherInput.required = false;
                otherInput.value = '';
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = {
                success: 'bg-gradient-to-r from-indigo-950 to-indigo-900 text-white border-indigo-700/50 shadow-indigo-900/20',
                warning: 'bg-gradient-to-r from-amber-400 to-amber-500 text-amber-950 border-amber-300 shadow-amber-500/20',
                error: 'bg-gradient-to-r from-rose-600 to-rose-700 text-white border-rose-500 shadow-rose-900/20'
            };
            toast.className = `toast-item p-3.5 rounded-xl shadow-lg text-xs font-bold flex justify-between items-center pointer-events-auto border ${styles[type] || styles.success}`;
            
            let icon = 'fa-circle-check';
            if (type === 'warning') icon = 'fa-bell';
            if (type === 'error') icon = 'fa-circle-exclamation';

            toast.innerHTML = `
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid ${icon} text-sm opacity-90"></i>
                    <span class="leading-snug">${message}</span>
                </div>
                <button onclick="this.parentElement.remove()" class="opacity-60 hover:opacity-100 ml-2 p-1 rounded-lg transition-opacity"><i class="fa-solid fa-xmark"></i></button>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-8px)';
                toast.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4200);
        }

        // Render cars selection inside header carousel
        function renderVehiclesCarousel() {
            const carousel = document.getElementById('vehicles-carousel');
            carousel.innerHTML = '';
            
            state.vehicles.forEach(v => {
                const isActive = v.id === state.selectedVehicleId;
                const activeClasses = isActive 
                    ? 'vehicle-card vehicle-card--active border-indigo-500 bg-gradient-to-br from-indigo-900 to-indigo-950 text-white shadow-lg ring-2 ring-indigo-400/30' 
                    : 'vehicle-card border-slate-200 bg-white hover:border-indigo-200 hover:shadow-md text-slate-800';

                const latestOdo = getLatestOdometer(v.id);

                carousel.innerHTML += `
                    <div onclick="selectVehicle('${v.id}')" class="vehicle-card snap-start shrink-0 w-[145px] md:w-auto p-3 rounded-xl border ${activeClasses} cursor-pointer">
                        <div class="vehicle-card-license text-[9px] ${isActive ? 'text-indigo-300' : 'text-indigo-600'} font-bold uppercase truncate md:whitespace-normal md:overflow-visible"><i class="fa-solid fa-id-card mr-0.5"></i>${v.license}</div>
                        <div class="vehicle-card-name font-extrabold text-xs truncate md:whitespace-normal md:overflow-visible mt-0.5 leading-snug">${v.name}</div>
                        <div class="mt-4 pt-1.5 border-t ${isActive ? 'border-indigo-800/60' : 'border-slate-100'} text-[10px] flex justify-between items-center font-mono">
                            <span class="${isActive ? 'text-indigo-200' : 'text-slate-400'}">ไมล์ล่าสุด:</span>
                            <span class="font-bold text-right">${latestOdo.toLocaleString()} กม.</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-cars-count').textContent = `${state.vehicles.length} คันในบ้าน`;
        }

        function getLatestOdometer(vehicleId) {
            // Find highest odometer between Maintenance Logs and Fuel Logs
            const mainLogs = state.maintenanceLogs.filter(l => l.vehicleId === vehicleId).map(l => l.odo);
            const fuelLogs = state.fuelLogs.filter(l => l.vehicleId === vehicleId).map(l => l.odo);
            const allOdos = [...mainLogs, ...fuelLogs, 0];
            return Math.max(...allOdos);
        }

        // Helper to format Date to Thai Buddhist Era representation (Fixed missing function bug)
        function formatThaiDate(dateStr) {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '-';
            return `${date.getDate()} ${thaiMonthsShort[date.getMonth()]} ${date.getFullYear() + 543}`;
        }

        // Calculate Cost/KM of maintenance and health percentage bar
        function calculateVehicleMetrics(vehicleId) {
            const logs = state.maintenanceLogs
                .filter(l => l.vehicleId === vehicleId)
                .sort((a, b) => a.odo - b.odo);

            const latestOdo = getLatestOdometer(vehicleId);
            
            let firstOdo = 0;
            if (logs.length > 0) {
                const validFirstOdoLogs = logs.filter(l => l.odo > 0);
                if (validFirstOdoLogs.length > 0) {
                    firstOdo = validFirstOdoLogs[0].odo;
                }
            }

            const totalDistance = latestOdo - firstOdo;
            document.getElementById('car-total-distance-label').textContent = `วิ่งไปแล้ว: ${totalDistance.toLocaleString()} กม.`;

            const totalCost = logs
                .filter(l => l.type === 'Maintenance')
                .reduce((sum, l) => sum + l.cost, 0);

            const costPerKmLabel = document.getElementById('car-cost-per-km-label');
            if (totalDistance > 0 && totalCost > 0) {
                const costPerKm = totalCost / totalDistance;
                costPerKmLabel.textContent = `฿${costPerKm.toFixed(2)} / กม.`;
            } else {
                costPerKmLabel.textContent = `฿0.00 / กม.`;
            }

            const alertObj = state.alerts.find(a => a.vehicleId === vehicleId && a.status === 'Active');
            const healthBar = document.getElementById('car-health-bar');
            const healthPercent = document.getElementById('car-health-percent');

            if (alertObj) {
                const totalTargetKm = alertObj.targetKm;
                const baseKm = alertObj.lastUpdated ? getLatestOdometerAtDate(vehicleId, alertObj.lastUpdated) : firstOdo;
                
                const range = totalTargetKm - baseKm;
                const runSinceLastAlertSet = latestOdo - baseKm;

                let safetyPct = 100;
                if (range > 0) {
                    safetyPct = Math.max(0, Math.min(100, 100 - ((runSinceLastAlertSet / range) * 100)));
                }

                healthPercent.textContent = `${safetyPct.toFixed(0)}%`;
                healthBar.style.width = `${safetyPct}%`;
                
                if (safetyPct < 20) {
                    healthBar.className = "bg-gradient-to-r from-rose-500 to-rose-600 h-1.5 rounded-full transition-all duration-500";
                    healthPercent.className = "text-rose-600 font-extrabold";
                } else if (safetyPct < 50) {
                    healthBar.className = "bg-gradient-to-r from-amber-400 to-amber-500 h-1.5 rounded-full transition-all duration-500";
                    healthPercent.className = "text-amber-500 font-extrabold";
                } else {
                    healthBar.className = "bg-gradient-to-r from-emerald-400 to-indigo-600 h-1.5 rounded-full transition-all duration-500";
                    healthPercent.className = "text-indigo-600 font-extrabold";
                }
            } else {
                healthPercent.textContent = "100%";
                healthBar.style.width = "100%";
                healthBar.className = "bg-slate-200 h-1.5 rounded-full";
                healthPercent.className = "text-slate-400 font-bold";
            }
        }

        function getLatestOdometerAtDate(vehicleId, dateStr) {
            const logsBeforeDate = state.maintenanceLogs
                .filter(l => l.vehicleId === vehicleId && l.date <= dateStr)
                .sort((a, b) => b.odo - a.odo);
            return logsBeforeDate.length > 0 ? logsBeforeDate[0].odo : 0;
        }

        function resolveAlertServiceLabel(alert) {
            if (!alert) return 'บำรุงรักษาตามกำหนด';
            if (alert.serviceLabel) return alert.serviceLabel;
            if (alert.categoryId) {
                const cat = state.categories.find(c => c.id === alert.categoryId);
                if (cat) return cat.name;
            }
            const logs = state.maintenanceLogs.filter(
                l => l.vehicleId === alert.vehicleId && l.date === alert.lastUpdated && (l.alertKm > 0 || l.alertMonth > 0)
            );
            if (logs.length > 0) {
                const cat = state.categories.find(c => c.id === logs[0].category);
                if (cat) return cat.name;
            }
            return 'บำรุงรักษาตามกำหนด';
        }

        function selectVehicle(id) {
            state.selectedVehicleId = id;
            renderVehiclesCarousel();
            
            const v = state.vehicles.find(v => v.id === id);
            if (!v) return;

            // Load values for selected tab
            const activeTab = document.querySelector('.tab-content:not(.hidden)').id;

            if (activeTab === 'tab-dashboard') {
                const latestOdo = getLatestOdometer(id);
                document.getElementById('current-odometer-val').textContent = latestOdo.toLocaleString();

                const latestLog = state.maintenanceLogs
                    .filter(l => l.vehicleId === id)
                    .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
                
                document.getElementById('odometer-updated-date').textContent = latestLog 
                    ? `อัปเดตล่าสุดเมื่อ: ${formatThaiDate(latestLog.date)}` 
                    : 'อัปเดตล่าสุด: ยังไม่เคยอัปเดต';

                const alertObj = state.alerts.find(a => a.vehicleId === id && a.status === 'Active');
                const targetServiceSpan = document.getElementById('target-service-val');
                const targetKmSpan = document.getElementById('target-odometer-val');
                const targetTimeSpan = document.getElementById('target-time-val');
                const statusBadge = document.getElementById('vehicle-status-badge');

                if (alertObj) {
                    const serviceLabel = resolveAlertServiceLabel(alertObj);
                    if (targetServiceSpan) {
                        targetServiceSpan.innerHTML = `รายการถัดไป: <span class="font-extrabold">${serviceLabel}</span>`;
                    }
                    targetKmSpan.innerHTML = `ตรวจระยะรอบต่อไป: <span class="text-indigo-700 font-extrabold">${alertObj.targetKm.toLocaleString()} กม.</span>`;
                    targetTimeSpan.innerHTML = `<i class="fa-solid fa-clock"></i> เตือนล่วงหน้า: ${formatThaiDate(alertObj.targetDate)}`;
                    
                    const kmDifference = alertObj.targetKm - latestOdo;
                    const daysRemaining = Math.ceil((new Date(alertObj.targetDate) - new Date()) / (1000 * 60 * 60 * 24));

                    if (kmDifference <= 1000 || daysRemaining <= 15) {
                        statusBadge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-rose-100 text-rose-800 flex items-center gap-1 urgent-alert";
                        statusBadge.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-rose-600 animate-ping"></span> ถึงกำหนดซ่อมบำรุง`;
                    } else {
                        statusBadge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-800 flex items-center gap-1";
                        statusBadge.innerHTML = `<i class="fa-solid fa-check"></i> ระยะทางปกติ`;
                    }
                } else {
                    if (targetServiceSpan) targetServiceSpan.innerHTML = '';
                    targetKmSpan.innerHTML = `<span class="text-slate-400">ยังไม่ได้รับการตั้งการเตือน</span>`;
                    targetTimeSpan.innerHTML = `<i class="fa-solid fa-circle-info"></i> ปลอดภัย`;
                    statusBadge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-slate-100 text-slate-600 flex items-center gap-1";
                    statusBadge.innerHTML = `<i class="fa-solid fa-minus"></i> ไม่มีแผนตั้งรับ`;
                }

                calculateVehicleMetrics(id);
                renderLogsHistory(id);
                renderReports();
            } else if (activeTab === 'tab-fuelio') {
                renderFuelLogs();
            }
        }

        // Render maintenance logs inside first page tab
        function renderLogsHistory(vehicleId, filterKeyword = '') {
            const container = document.getElementById('maintenance-history-logs');
            if (!container) return;
            container.innerHTML = '';

            let logs = state.maintenanceLogs
                .filter(l => l.vehicleId === vehicleId)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filterKeyword.trim() !== '') {
                const kw = filterKeyword.toLowerCase().trim();
                logs = logs.filter(l => {
                    const shopMatch = (l.shop || '').toLowerCase().includes(kw);
                    const catObj = state.categories.find(c => c.id === l.category);
                    const catMatch = catObj && catObj.name.toLowerCase().includes(kw);
                    const odoMatch = String(l.odo).includes(kw);
                    return shopMatch || catMatch || odoMatch;
                });
            }

            if (logs.length === 0) {
                const emptyMsg = filterKeyword.trim() !== ''
                    ? 'ไม่พบผลลัพธ์ที่ตรงกับคำค้นหา'
                    : 'ยังไม่มีประวัติการซ่อมบำรุงของรถคันนี้';
                container.innerHTML = `
                    <div class="empty-state space-y-2">
                        <i class="fa-solid fa-wrench text-3xl text-indigo-200 block"></i>
                        <p class="font-bold text-slate-500">${emptyMsg}</p>
                        <p class="text-[10px] text-slate-400">กด "บันทึกการซ่อมบำรุง" เพื่อเพิ่มรายการแรก</p>
                    </div>
                `;
                return;
            }

            logs.forEach(l => {
                const isMaintenance = l.type === 'Maintenance';
                const catObj = isMaintenance ? state.categories.find(c => c.id === l.category) : null;
                const catName = catObj ? catObj.name : 'ไม่ได้จัดหมวดหมู่';

                container.innerHTML += `
                    <div class="bg-white p-3.5 rounded-xl border border-slate-200/60 shadow-sm hover:shadow transition-all relative overflow-hidden">
                        <div class="flex justify-between items-start">
                            <div class="space-y-1">
                                <div class="flex items-center space-x-1.5 flex-wrap gap-y-1">
                                    <span class="px-2 py-0.5 rounded text-[8px] font-extrabold tracking-wide ${
                                        isMaintenance ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-700'
                                    }">
                                        ${isMaintenance ? catName : 'อัปเดตระยะสะสม'}
                                    </span>
                                    <span class="text-[9px] font-bold text-slate-400 font-mono">${formatThaiDate(l.date)}</span>
                                </div>
                                <h4 class="text-xs font-bold text-slate-800 pt-0.5">${isMaintenance ? l.shop : 'อัปเดตเลขไมล์เปล่า (ไม่มีงานซ่อม)'}</h4>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-extrabold ${isMaintenance ? 'text-indigo-600' : 'text-slate-400'} font-mono">
                                    ${isMaintenance ? '฿' + l.cost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '-'}
                                </span>
                                <div class="text-[9px] text-slate-400 font-bold font-mono">เลขไมล์: ${l.odo.toLocaleString()} กม.</div>
                            </div>
                        </div>

                        ${isMaintenance && (l.alertKm > 0 || l.alertMonth > 0) ? `
                        <div class="mt-2.5 pt-2 border-t border-slate-100 flex flex-wrap gap-x-3 gap-y-1 text-[9px] text-indigo-950 font-bold">
                            ${l.alertKm > 0 ? `<span><i class="fa-solid fa-road text-indigo-400"></i> เตือนถัดไป: +${l.alertKm.toLocaleString()} กม.</span>` : ''}
                            ${l.alertMonth > 0 ? `<span><i class="fa-solid fa-calendar-check text-indigo-400"></i> เตือนถัดไป: +${l.alertMonth} เดือน</span>` : ''}
                        </div>
                        ` : ''}

                        ${l.receipt ? `
                        <div class="mt-2 pt-2 border-t border-slate-100 flex justify-between items-center">
                            <div class="flex items-center gap-1">
                                ${l.receiptBase64 ? 
                                    `<img src="${l.receiptBase64}" class="w-6 h-6 object-cover rounded border border-slate-200 cursor-pointer" onclick="viewFullReceipt('${l.receiptBase64}', '${l.receipt}')">` : 
                                    `<i class="fa-solid fa-receipt text-indigo-500"></i>`
                                }
                                <span class="text-[9px] text-emerald-700 font-bold">ใบเสร็จแนบแล้ว</span>
                            </div>
                            <a href="${l.fileLink}" target="_blank" class="text-[9px] font-bold text-indigo-600 hover:underline"><i class="fa-solid fa-external-link"></i> ตรวจ Folder</a>
                        </div>
                        ` : ''}

                        <button onclick="openEditLogModal('${l.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-indigo-600 p-1">
                            <i class="fa-solid fa-ellipsis-vertical text-[10px]"></i>
                        </button>
                    </div>
                `;
            });
        }

        // Search Filter for History
        function filterLogsList() {
            const val = document.getElementById('log-search-input').value;
            const clearBtn = document.getElementById('clear-search-btn');
            
            if (val.trim() !== '') {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }

            renderLogsHistory(state.selectedVehicleId, val);
        }

        function clearSearch() {
            document.getElementById('log-search-input').value = '';
            document.getElementById('clear-search-btn').classList.add('hidden');
            renderLogsHistory(state.selectedVehicleId);
        }

        // FUELIO LOGIC RENDER (Rule: สถิติสิ้นเปลืองและค่าน้ำมันเฉลี่ยรายคัน)
        function renderFuelLogs() {
            const container = document.getElementById('fuel-logs-container');
            if (!container) return;
            container.innerHTML = '';

            const vehicleId = state.selectedVehicleId;
            const logs = state.fuelLogs
                .filter(l => l.vehicleId === vehicleId)
                .sort((a, b) => new Date(a.date) - new Date(b.date)); // Sort chronologically to compute consumption

            let totalCostSum = 0;
            let totalLitersSum = 0;
            let efficiencySum = 0;
            let efficiencyCount = 0;

            // Compute consumption step-by-step
            for (let i = 0; i < logs.length; i++) {
                const current = logs[i];
                totalCostSum += current.totalCost;
                totalLitersSum += current.liters;

                let calculatedEfficiency = null; // Km / Liter
                let costPerKm = null; // Baht / Km

                // We can calculate consumption only if previous full-tank log exists (Standard Fuelio logic)
                if (i > 0 && current.fullTank && logs[i-1].fullTank) {
                    const distance = current.odo - logs[i-1].odo;
                    if (distance > 0) {
                        calculatedEfficiency = distance / current.liters;
                        costPerKm = current.totalCost / distance;

                        efficiencySum += calculatedEfficiency;
                        efficiencyCount++;

                        current.calculatedEfficiency = calculatedEfficiency;
                        current.costPerKm = costPerKm;
                    }
                }
            }

            // Update UI Summary Header Cards
            const avgEfficiencyEl = document.getElementById('fuel-avg-efficiency');
            const avgCostKmEl = document.getElementById('fuel-avg-cost-km');
            const lastPriceLiterEl = document.getElementById('fuel-last-price-liter');
            const totalLitersEl = document.getElementById('fuel-total-liters');
            const totalSpendEl = document.getElementById('fuel-total-spend');

            if (efficiencyCount > 0) {
                const avgEffVal = efficiencySum / efficiencyCount;
                avgEfficiencyEl.textContent = avgEffVal.toFixed(2);
                
                // Average cost per kilometer
                const totalCalculatedCost = logs.slice(1).reduce((sum, l) => sum + (l.costPerKm ? l.totalCost : 0), 0);
                const totalCalculatedDistance = logs.slice(1).reduce((sum, l, idx) => {
                    return sum + (l.costPerKm ? (l.odo - logs[idx].odo) : 0);
                }, 0);
                avgCostKmEl.textContent = totalCalculatedDistance > 0 ? (totalCalculatedCost / totalCalculatedDistance).toFixed(2) : '-.--';
            } else {
                avgEfficiencyEl.textContent = '-.--';
                avgCostKmEl.textContent = '-.--';
            }

            if (logs.length > 0) {
                lastPriceLiterEl.textContent = logs[logs.length-1].pricePerLiter.toFixed(2);
            } else {
                lastPriceLiterEl.textContent = '-.--';
            }

            totalLitersEl.textContent = `${totalLitersSum.toLocaleString(undefined, {maximumFractionDigits: 1})} ลิตร`;
            totalSpendEl.textContent = `฿${totalCostSum.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // Render fuel logs items (Newest on top)
            const reversedLogs = [...logs].reverse();
            if (reversedLogs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state space-y-2">
                        <i class="fa-solid fa-gas-pump text-3xl text-emerald-200 block"></i>
                        <p class="font-bold text-slate-500">ยังไม่มีบันทึกการเติมเชื้อเพลิง</p>
                        <p class="text-[10px] text-slate-400">กดปุ่ม "บันทึกรายการเติมน้ำมันด่วน" เพื่อเริ่มติดตามอัตราสิ้นเปลือง</p>
                    </div>
                `;
                return;
            }

            reversedLogs.forEach(l => {
                const hasEfficiency = l.calculatedEfficiency !== undefined && l.calculatedEfficiency !== null;
                const fuelType = l.fuelType || 'oil'; // default is oil
                
                let efficiencyClass = "bg-slate-100 text-slate-600";
                if (hasEfficiency) {
                    if (l.calculatedEfficiency > 15) {
                        efficiencyClass = "bg-emerald-50 text-emerald-800 border border-emerald-100";
                    } else if (l.calculatedEfficiency > 11) {
                        efficiencyClass = "bg-amber-50 text-amber-800 border border-amber-100";
                    } else {
                        efficiencyClass = "bg-rose-50 text-rose-800 border border-rose-100";
                    }
                }

                // Render specific badges for fuel types
                const fuelTypeBadge = fuelType === 'gas'
                    ? `<span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-[8px] font-black flex items-center gap-1"><i class="fa-solid fa-fire-flame-simple"></i> แก๊ส GAS</span>`
                    : `<span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded text-[8px] font-black flex items-center gap-1"><i class="fa-solid fa-gas-pump"></i> น้ำมัน OIL</span>`;

                container.innerHTML += `
                    <div class="bg-white p-3.5 rounded-xl border border-slate-200/60 shadow-sm hover:shadow transition-all relative">
                        <div class="flex justify-between items-start">
                            <div class="space-y-1">
                                <div class="flex items-center gap-1.5 flex-wrap">
                                    ${fuelTypeBadge}
                                    <span class="bg-slate-100 text-slate-700 px-1.5 py-0.2 rounded text-[8px] font-bold">${l.liters.toFixed(1)} ลิตร</span>
                                    <span class="text-[9px] font-bold text-slate-400 font-mono">${formatThaiDate(l.date)}</span>
                                    ${l.fullTank ? `<span class="bg-indigo-50 text-indigo-700 px-1.5 py-0.2 rounded text-[8px] font-black">เต็มถัง</span>` : ''}
                                </div>
                                <div class="text-xs font-bold text-slate-700 pt-0.5">ค่ายอดเติม: ฿${l.totalCost.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            </div>
                            <div class="text-right text-xs">
                                <span class="font-extrabold text-slate-800 block">${l.pricePerLiter.toFixed(2)} บาท/ลิตร</span>
                                <span class="text-[9px] text-slate-400 font-bold font-mono">ไมล์สะสม: ${l.odo.toLocaleString()} กม.</span>
                            </div>
                        </div>

                        <!-- Efficiency stats badge -->
                        ${hasEfficiency ? `
                        <div class="mt-2.5 pt-2 border-t border-slate-100 flex items-center justify-between text-[9px] font-bold">
                            <span class="px-2 py-1 rounded-lg ${efficiencyClass}">
                                <i class="fa-solid fa-seedling mr-1"></i> อัตราประหยัด: ${l.calculatedEfficiency.toFixed(2)} กม./ลิตร
                            </span>
                            <span class="text-slate-500">
                                <i class="fa-solid fa-coins mr-1"></i> เฉลี่ย: ${l.costPerKm.toFixed(2)} บาท/กม.
                            </span>
                        </div>
                        ` : `
                        <div class="mt-2.5 pt-2 border-t border-slate-100 text-[9px] text-slate-400 font-bold">
                            💡 เติมเต็มถังประเภทเดียวกันครั้งหน้าเพื่อเริ่มคำนวณความประหยัดสะสม
                        </div>
                        `}

                        <!-- Quick delete action inside Fuelio logs -->
                        <button onclick="deleteFuelLog('${l.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-rose-600 transition-all">
                            <i class="fa-solid fa-trash-can text-[10px]"></i>
                        </button>
                    </div>
                `;
            });
        }

        function handleCalendarSelectChange() {
            const monthSel = document.getElementById('calendar-month-select');
            const yearSel = document.getElementById('calendar-year-select');

            if (monthSel) calendarViewMonth = parseInt(monthSel.value);
            if (yearSel) calendarViewYear = parseInt(yearSel.value);

        function selectCalendarDate(day) {
            calendarSelectedDate = new Date(calendarViewYear, calendarViewMonth, day);
            
            const offsetDate = new Date(calendarSelectedDate.getTime() - (calendarSelectedDate.getTimezoneOffset() * 60000));
            const formattedIso = offsetDate.toISOString().split('T')[0];

            const displayThaiStr = `${day} ${thaiMonthsShort[calendarViewMonth]} ${calendarViewYear + 543}`;

            // Distribute value into target fields
            if (calendarTargetField === 'maintenance') {
                document.getElementById('rep-date').value = formattedIso;
                document.getElementById('calendar-trigger-text').textContent = displayThaiStr;
            } else {
                document.getElementById('fuel-date').value = formattedIso;
                document.getElementById('fuel-calendar-trigger-text').textContent = displayThaiStr;
            }

            renderCustomCalendar();
            document.getElementById('custom-calendar-dropdown').classList.add('hidden');
        }

        function renderCustomCalendar() {
            const gridEl = document.getElementById('calendar-days-grid');
            if (!gridEl) return;

            gridEl.innerHTML = '';

            const firstDayIndex = new Date(calendarViewYear, calendarViewMonth, 1).getDay();
            const totalDays = new Date(calendarViewYear, calendarViewMonth + 1, 0).getDate();
            const totalDaysPrevMonth = new Date(calendarViewYear, calendarViewMonth, 0).getDate();

            for (let i = firstDayIndex; i > 0; i--) {
                const prevDay = totalDaysPrevMonth - i + 1;
                gridEl.innerHTML += `<div class="p-2 text-[11px] text-slate-300 font-medium text-center pointer-events-none">${prevDay}</div>`;
            }

            for (let day = 1; day <= totalDays; day++) {
                const isSelected = calendarSelectedDate.getDate() === day && 
                                   calendarSelectedDate.getMonth() === calendarViewMonth && 
                                   calendarSelectedDate.getFullYear() === calendarViewYear;
                
                const today = new Date();
                const isToday = day === today.getDate() && calendarViewMonth === today.getMonth() && calendarViewYear === today.getFullYear();

                let dayClass = "p-2 text-[11px] font-bold text-center rounded-xl cursor-pointer hover:bg-indigo-50 hover:text-indigo-600 transition-all ";
                
                if (isSelected) {
                    dayClass += "bg-indigo-600 text-white hover:bg-indigo-700 hover:text-white shadow-md shadow-indigo-100";
                } else if (isToday) {
                    dayClass += "bg-emerald-50 text-emerald-700 border border-emerald-300/60";
                } else {
                    dayClass += "text-slate-700";
                }

                gridEl.innerHTML += `<div onclick="selectCalendarDate(${day})" class="${dayClass}">${day}</div>`;
            }

            const totalRendered = firstDayIndex + totalDays;
            const remainingGridSpaces = (7 - (totalRendered % 7)) % 7;
            for (let i = 1; i <= remainingGridSpaces; i++) {
                gridEl.innerHTML += `<div class="p-2 text-[11px] text-slate-300 font-medium text-center pointer-events-none">${i}</div>`;
            }
        }

        // Action: Save maintenance log
        function saveMaintenanceLog(e) {
            e.preventDefault();
            const vId = document.getElementById('rep-vehicle-select').value;
            const odoVal = parseInt(document.getElementById('rep-mileage').value);
            let category = document.getElementById('rep-category').value;
            const cost = parseFloat(document.getElementById('rep-cost').value);
            const shop = document.getElementById('rep-shop').value;
            const receiptInput = document.getElementById('rep-receipt');
            const repairDate = document.getElementById('rep-date').value || new Date().toISOString().split('T')[0];
            const lastOdo = getLatestOdometer(vId);
            if (odoVal < lastOdo) {
                showToast("เลขไมล์ปัจจุบันต่ำกว่าไมล์ครั้งล่าสุด!", "error");
                return;
            }
            let otherCategoryName = '';
            if (category === 'OTHER') {
                otherCategoryName = document.getElementById('rep-category-other').value.trim();
                if (!otherCategoryName) {
                    showToast("กรุณาระบุประเภทงานซ่อมอื่นๆ", "error");
                    return;
                }
            }
            let receiptName = '';
            let receiptBase64 = '';
            let receiptMimeType = '';
            if (receiptInput.files && receiptInput.files[0]) {
                const file = receiptInput.files[0];
                receiptName = file.name;
                receiptMimeType = file.type;
                receiptBase64 = currentUploadedReceiptBase64;
            }
            const alertKmEnabled = document.getElementById('alert-km-enable').checked;
            const alertMonthEnabled = document.getElementById('alert-month-enable').checked;
            const alertKm = alertKmEnabled ? parseInt(document.getElementById('alert-km-offset').value) : 0;
            const alertMonth = alertMonthEnabled ? parseInt(document.getElementById('alert-month-offset').value) : 0;
            runGas('saveMaintenanceLog', {
                vehicleId: vId,
                odo: odoVal,
                category: category,
                otherCategoryName: otherCategoryName,
                cost: cost,
                shop: shop,
                date: repairDate,
                alertKm: alertKm,
                alertMonth: alertMonth,
                receiptName: receiptName,
                receiptBase64: receiptBase64,
                receiptMimeType: receiptMimeType
            }, function(result) {
                applyState(result.state);
                closeModal('repair-modal');
                showToast("บันทึกการซ่อมบำรุงเรียบร้อย");
                document.getElementById('repair-form').reset();
                currentUploadedReceiptBase64 = "";
                document.getElementById('receipt-upload-preview').innerHTML = `
                    <i class="fa-solid fa-cloud-arrow-up text-lg text-indigo-500 mb-1"></i>
                    <div class="text-[9px] font-bold">แตะเพื่อถ่ายภาพหรือเลือกใบเสร็จรับเงิน</div>
                `;
                toggleAlertInputs();
                setDefaultDates();
                refreshUI();
            });
        }

                odo: parseInt(document.getElementById('fuel-odo').value),
                liters: parseFloat(document.getElementById('fuel-liters').value),

        function checkLineAlerts(isManual = false) {

                if (result.notificationTriggered) {
                    showLineBubble((result.messages || []).join(String.fromCharCode(10)));
                    showToast(result.lineNotifyConfigured ? "LINE แจ้งเตือนครอบครัวเรียบร้อย!" : "แจ้งเตือน (โหมดจำลอง) เรียบร้อย!", "warning");
                } else if (isManual) {
                    showToast("รถทุกคันอยู่ในสภาพปกติและปลอดภัย");
                }
            });
        }

        function showLineBubble(text) {
            const bubble = document.getElementById('line-notification-bubble');
            const txt = document.getElementById('line-notification-text');
            if (txt) txt.innerHTML = text.replace(/\n/g, '<br>');
            if (bubble) bubble.classList.remove('hidden');
            setTimeout(() => {
                if (bubble) bubble.style.transform = "translateY(0)";
            }, 100);
        }

        function dismissLineBubble() {
            const bubble = document.getElementById('line-notification-bubble');
            if (bubble) bubble.style.transform = "translateY(-100px)";
            setTimeout(() => {
                if (bubble) bubble.classList.add('hidden');
            }, 300);
        }

        function getLogYear(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return null;
            const match = dateStr.match(/^(\d{4})/);
            return match ? parseInt(match[1], 10) : null;
        }

        function populateReportYearFilter(vehicleId) {
            const yearFilterEl = document.getElementById('report-year-filter');
            if (!yearFilterEl) return null;

            const yearCounts = {};
            state.maintenanceLogs.forEach(l => {
                if (l.type !== 'Maintenance' || l.vehicleId !== vehicleId) return;
                const year = getLogYear(l.date);
                if (year == null) return;
                yearCounts[year] = (yearCounts[year] || 0) + 1;
            });

            let years = Object.keys(yearCounts).map(Number).sort((a, b) => b - a);
            if (years.length === 0) {
                years = [new Date().getFullYear()];
            }

            const previousValue = yearFilterEl.value;
            yearFilterEl.innerHTML = years.map(y =>
                `<option value="${y}">พ.ศ. ${y + 543}</option>`
            ).join('');

            const currentYear = new Date().getFullYear();
            let selectedYear;
            if (previousValue && years.includes(parseInt(previousValue, 10))) {
                selectedYear = parseInt(previousValue, 10);
            } else if (yearCounts[currentYear]) {
                selectedYear = currentYear;
            } else {
                selectedYear = years.reduce((best, y) =>
                    (yearCounts[y] > (yearCounts[best] || 0)) ? y : best, years[0]);
            }
            yearFilterEl.value = String(selectedYear);
            return selectedYear;
        }

        // Render Reports (Annual spending visualization inside tab 1)
        function renderReports() {
            const yearFilterEl = document.getElementById('report-year-filter');
            if (!yearFilterEl) return;

            const targetVehicle = state.selectedVehicleId;
            if (!targetVehicle) return;

            populateReportYearFilter(targetVehicle);
            const targetYear = yearFilterEl.value;

            const yearLogs = state.maintenanceLogs.filter(l => {
                if (l.type !== 'Maintenance' || l.vehicleId !== targetVehicle) return false;
                const logYear = getLogYear(l.date);
                return logYear !== null && String(logYear) === String(targetYear);
            });

            const total = yearLogs.reduce((acc, current) => acc + (current.cost || 0), 0);
            document.getElementById('yearly-total-spend').textContent = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('yearly-repairs-count').textContent = `${yearLogs.length} รายการ`;

            const categorySums = {};
            state.categories.forEach(cat => {
                categorySums[cat.id] = 0;
            });

            yearLogs.forEach(l => {
                if (categorySums[l.category] !== undefined) {
                    categorySums[l.category] += l.cost;
                } else {
                    categorySums['other'] = (categorySums['other'] || 0) + l.cost;
                }
            });

            const barContainer = document.getElementById('chart-bar-container');
            if (!barContainer) return;
            barContainer.innerHTML = '';

            const categoriesSorted = Object.keys(categorySums).map(catId => {
                const catObj = state.categories.find(c => c.id === catId);
                return {
                    id: catId,
                    name: catObj ? catObj.name : 'อื่นๆ',
                    sum: categorySums[catId]
                };
            }).sort((a, b) => b.sum - a.sum);

            categoriesSorted.forEach(cat => {
                if (cat.sum === 0) return;
                const pct = total > 0 ? ((cat.sum / total) * 100).toFixed(0) : 0;

                barContainer.innerHTML += `
                    <div class="space-y-1 text-[11px]">
                        <div class="flex justify-between text-slate-700 font-bold">
                            <span>${cat.name}</span>
                            <span>${pct}% (฿${cat.sum.toLocaleString()})</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2">
                            <div class="bg-gradient-to-r from-indigo-500 to-indigo-600 h-2 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            });

            if (total === 0) {
                barContainer.innerHTML = `
                    <div class="text-center py-6 text-slate-400 text-[10px] font-bold bg-slate-50 border border-slate-200 border-dashed rounded-xl">
                        ไม่พบประวัติการใช้จ่ายในปี พ.ศ. ${parseInt(targetYear) + 543} ของรถคันนี้
                    </div>
                `;
            }
        }

        // ADMIN TAB STATE MANAGEMENT (Rule: แผงแอดมิน admin / 1234)
        function renderAdminPanelState() {
            if (state.adminAuthenticated) {
                document.getElementById('admin-tab-auth-view').classList.add('hidden');
                document.getElementById('admin-tab-controls').classList.remove('hidden');
                renderAdminVehicles();
                renderAdminCategories();
            } else {
                document.getElementById('admin-tab-auth-view').classList.remove('hidden');
                document.getElementById('admin-tab-controls').classList.add('hidden');
            }
        }

        function authenticateAdmin() {
            const user = document.getElementById('admin-username').value.trim();
            const pass = document.getElementById('admin-passcode').value;
            runGas('verifyAdmin', { username: user, password: pass }, function(result) {
                if (result.authenticated) {
                    state.adminAuthenticated = true;
                    showToast("ยินดีต้อนรับแอดมินบ้าน เข้าสู่โหมดควบคุมแล้ว");
                    renderAdminPanelState();
                } else {
                    showToast(result.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง! (admin / 1234)", "error");
                }
            });
        }

        function logoutAdmin() {
            state.adminAuthenticated = false;
            document.getElementById('admin-username').value = '';
            document.getElementById('admin-passcode').value = '';
            renderAdminPanelState();
            showToast("ออกจากระบบแอดมินเรียบร้อย");
        }

        function switchAdminSubTab(tab) {
            const btnCars = document.getElementById('btn-admin-tab-cars');
            const btnCats = document.getElementById('btn-admin-tab-categories');
            const viewCars = document.getElementById('admin-view-cars');
            const viewCats = document.getElementById('admin-view-categories');

            if (tab === 'cars') {
                btnCars.className = "flex-1 py-2 text-center font-bold bg-indigo-50 text-indigo-700";
                btnCats.className = "flex-1 py-2 text-center font-bold text-slate-400 hover:bg-slate-50";
                viewCars.classList.remove('hidden');
                viewCats.classList.add('hidden');
            } else {
                btnCats.className = "flex-1 py-2 text-center font-bold bg-indigo-50 text-indigo-700";
                btnCars.className = "flex-1 py-2 text-center font-bold text-slate-400 hover:bg-slate-50";
                viewCats.classList.remove('hidden');
                viewCars.classList.add('hidden');
            }
        }

        function renderAdminVehicles() {
            const list = document.getElementById('admin-vehicles-list');
            if (!list) return;
            list.innerHTML = '';
            
            if (state.vehicles.length === 0) {
                list.innerHTML = `<div class="empty-state py-6"><i class="fa-solid fa-car text-2xl text-indigo-200 mb-2 block"></i>ยังไม่มีรถในระบบ — เพิ่มรถคันแรกด้านบน</div>`;
                return;
            }

            state.vehicles.forEach(v => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg border border-slate-200 gap-2">
                        <div class="min-w-0 flex-1">
                            <span class="font-extrabold text-slate-800 text-xs block truncate" title="${v.name}">${v.name}</span>
                            <span class="text-[9px] text-slate-500 block font-bold font-mono truncate">${v.license}</span>
                        </div>
                        <button onclick="deleteVehicleAdmin('${v.id}')" class="text-rose-500 hover:text-rose-700 p-1 shrink-0">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            });
        }

        function addVehicleAdmin(e) {
            e.preventDefault();
            const name = document.getElementById('add-car-name').value;
            const license = document.getElementById('add-car-license').value;
            runGas('addVehicle', { name: name, license: license }, function(result) {
                applyState(result.state);
                document.getElementById('add-car-name').value = '';
                document.getElementById('add-car-license').value = '';
                renderAdminVehicles();
                refreshUI();
                showToast("เพิ่มข้อมูลรถยนต์คันใหม่สำเร็จ");
            });
        }

        function deleteVehicleAdmin(id) {
            runGas('deleteVehicle', id, function(result) {
                applyState(result.state);
                renderAdminVehicles();
                refreshUI();
                showToast("ลบรถสำเร็จ");
            });
        }

        function renderAdminCategories() {
            const list = document.getElementById('admin-categories-list');
            if (!list) return;
            list.innerHTML = '';

            if (state.categories.length === 0) {
                list.innerHTML = `<div class="empty-state py-6"><i class="fa-solid fa-tags text-2xl text-indigo-200 mb-2 block"></i>ยังไม่มีหมวดหมู่ — เพิ่มประเภทงานด้านบน</div>`;
                return;
            }

            state.categories.forEach(c => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-lg border border-slate-200 gap-2">
                        <span class="font-extrabold text-slate-800 text-xs truncate min-w-0 flex-1" title="${c.name}">${c.name}</span>
                        <button onclick="deleteCategoryAdmin('${c.id}')" class="text-rose-500 hover:text-rose-700 p-1 shrink-0">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            });
        }

        function addCategoryAdmin(e) {
            e.preventDefault();
            const name = document.getElementById('add-cat-name').value;
            runGas('addCategory', { name: name }, function(result) {
                applyState(result.state);
                document.getElementById('add-cat-name').value = '';
                renderAdminCategories();
                populateDropdowns();
                showToast("เพิ่มประเภทบริการสำเร็จ");
            });
        }

        function deleteCategoryAdmin(id) {
            runGas('deleteCategory', id, function(result) {
                applyState(result.state);
                renderAdminCategories();
                populateDropdowns();
                showToast("ลบประเภทเรียบร้อย");
            });
        }

        // EDIT LOG MODAL IMPLEMENTATION
        function openEditLogModal(logId) {
            const log = state.maintenanceLogs.find(l => l.id === logId);
            if (!log) return;

            document.getElementById('edit-log-id').value = log.id;
            document.getElementById('edit-log-odo').value = log.odo;
            document.getElementById('edit-log-shop').value = log.shop === '-' ? '' : log.shop;
            document.getElementById('edit-log-cost').value = log.cost;

            document.getElementById('edit-log-modal').classList.remove('hidden');
        }

        // Save edited log entry values
        function saveEditedLog(e) {
            e.preventDefault();
            const logId = document.getElementById('edit-log-id').value;
            runGas('saveEditedLog', {
                id: logId,
                odo: parseInt(document.getElementById('edit-log-odo').value),
                shop: document.getElementById('edit-log-shop').value || '-',
                cost: parseFloat(document.getElementById('edit-log-cost').value)
            }, function(result) {
                applyState(result.state);
                closeModal('edit-log-modal');
                showToast("แก้ไขข้อมูลการซ่อมบำรุงสำเร็จ");
                refreshUI();
            });
        }

        // Delete maintenance log
        function deleteMaintenanceLog() {
            const logId = document.getElementById('edit-log-id').value;
            runGas('deleteMaintenanceLog', logId, function(result) {
                applyState(result.state);
                closeModal('edit-log-modal');
                showToast("ลบรายการออกจากบันทึกสำเร็จ", "warning");
                refreshUI();
            });
        }

        // GitHub Pages: simulate daily trigger setup (GAS uses google.script.run)
        function setupDailyTrigger() {
            const statusEl = document.getElementById('setup-trigger-status');
            const ts = new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });
            state.lineLogs.push(`⏰ [${ts}] จำลองสร้าง Daily Trigger 08:00 น. สำเร็จ (GitHub Pages — ไม่มี Apps Script จริง)`);
            saveToLocalStorage();
            if (statusEl) {
                statusEl.textContent = '✓ จำลองสร้าง trigger สำเร็จ — ใน GAS จริงจะรันที่ Apps Script';
                statusEl.classList.remove('hidden');
            }
            showToast('จำลองสร้าง Daily Trigger 08:00 น. สำเร็จ (GitHub Pages)');
        }

        // Tab routing helper
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');

            const tabs = ['dashboard', 'fuelio', 'admin'];
            tabs.forEach(t => {
                const navBtn = document.getElementById(`nav-${t}`);
                const isActive = t === tabId;
                const isFuel = t === 'fuelio';
                const base = 'nav-tab-btn flex flex-col items-center justify-center transition-all';
                const active = isFuel ? ' nav-tab-btn--fuel nav-tab-btn--active text-emerald-700' : ' nav-tab-btn--active text-indigo-600';
                const inactive = isFuel ? ' nav-tab-btn--fuel text-slate-400 hover:text-emerald-600' : ' text-slate-400 hover:text-indigo-600';
                navBtn.className = base + (isActive ? active : inactive);
            });

            if (tabId === 'dashboard') {
                selectVehicle(state.selectedVehicleId);
            } else if (tabId === 'fuelio') {
                renderFuelLogs();
            } else if (tabId === 'admin') {
                renderAdminPanelState();
            }
        }

        
        function exportReportPdf() {
            const year = document.getElementById('report-year-filter').value;
            const vehicleId = state.selectedVehicleId;
            if (!vehicleId) {
                showToast('กรุณาเลือกรถก่อนส่งออกรายงาน', 'error');
                return;
            }
            showLoading('กำลังสร้าง PDF...');
            google.script.run
                .withSuccessHandler(function(result) {
                    hideLoading();
                    if (!result || !result.success) {
                        showToast((result && result.error) || 'ส่งออก PDF ไม่สำเร็จ', 'error');
                        return;
                    }
                    const link = document.createElement('a');
                    link.href = 'data:' + result.mimeType + ';base64,' + result.base64;
                    link.download = result.filename || 'report.pdf';
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    showToast('ดาวน์โหลดรายงาน PDF สำเร็จ');
                })
                .withFailureHandler(function(err) {
                    hideLoading();
                    showToast(err.message || String(err), 'error');
                })
                .exportReportPdf(vehicleId, year);
        }

        window.onload = function () {
            initApp();
        }
    
</script>
